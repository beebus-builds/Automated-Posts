<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Day | Production Dashboard</title>
<style>
:root {
    --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
    --accent: #38bdf8; --red: #e11d48; --yellow: #fbbf24;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 450px; background: #020617; border-right: 1px solid #334155; padding: 24px; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }

h1 { font-size: 24px; font-weight: 800; margin-bottom: 24px; color: var(--accent); }
label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
input, select, textarea { width: 100%; padding: 12px; background: var(--card); border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 16px; }

.quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
.quick-btn { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: var(--card); color: #cbd5e1; cursor: pointer; font-size: 12px; }
.quick-btn.active { border-color: var(--accent); background: #0369a122; color: var(--accent); }

.preview-frame { width: 400px; height: 400px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; background: #000; position: relative; }
.preview-img { width: 100%; height: 100%; object-fit: cover; }
.preview-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }

.btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-weight: 800; cursor: pointer; font-size: 16px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h1>MATCH DAY <small style="display:block; color:#64748b; font-size:12px;">PRODUCTION DASHBOARD</small></h1>
    <form id="postForm">
      <div class="quick-actions" id="eventButtons">
        <button type="button" class="quick-btn" onclick="setEvent('goal')">Goal</button>
        <button type="button" class="quick-btn" onclick="setEvent('card')">Card</button>
        <button type="button" class="quick-btn" onclick="setEvent('sub')">Sub</button>
        <button type="button" class="quick-btn" onclick="setEvent('fulltime')">FT</button>
      </div>
      <input type="hidden" name="event" id="eventSelect" value="goal">
      <div class="row" style="display:flex; gap:10px;">
        <div style="flex:1"><label>Home</label><input name="home" oninput="refreshPreview()"></div>
        <div style="flex:1"><label>Away</label><input name="away" oninput="refreshPreview()"></div>
      </div>
      <label>Scorer/Player</label><input name="scorer" oninput="refreshPreview()">
      <label>Minute</label><input name="minute" oninput="refreshPreview()">
      <button type="submit" class="btn" id="submitBtn">POST TO FACEBOOK</button>
    </form>
  </div>
  <div class="main">
    <div class="preview-frame">
      <img id="previewImage" class="preview-img" src="" alt="Preview">
      <div class="preview-overlay">
        <div id="previewCaption">Waiting...</div>
      </div>
    </div>
  </div>
</div>
<script>
function setEvent(e) { 
    document.getElementById('eventSelect').value = e;
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === e.substring(0,3)));
    refreshPreview();
}
let timer;
function refreshPreview() { clearTimeout(timer); timer = setTimeout(doRefresh, 300); }
async function doRefresh() {
    const data = Object.fromEntries(new FormData(document.getElementById('postForm')));
    const res = await fetch('/api/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const r = await res.json();
    if(r.preview_url) {
        document.getElementById('previewImage').src = r.preview_url + '?t=' + Date.now();
        document.getElementById('previewCaption').textContent = r.caption;
    }
}
document.getElementById('postForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    alert('Posting...');
});
</script>
</body>
</html>

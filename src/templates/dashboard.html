<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Day | Production Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --navy: #1a2332;
  --navy-dark: #0d1419;
  --red: #dc143c;
  --gold: #fbbf24;
  --cream: #f5f5dc;
  --surface: #131d2b;
  --surface-2: #1a2a3f;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --border: rgba(255,255,255,.08);
  --glow: rgba(220,20,60,.25);
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--navy-dark);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(220,20,60,.08), transparent),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(251,191,36,.04), transparent);
}

.app {
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  max-width: 100%;
  margin: 0 auto;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(13,20,25,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--red), #ff6b35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  color: #fff;
}
.header h1 {
  font-size: clamp(14px, 3vw, 20px);
  font-weight: 800;
  letter-spacing: .02em;
  background: linear-gradient(135deg, #fff 60%, var(--red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  display: none;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .15em;
  text-transform: uppercase;
}
.header-actions {
  display: flex;
  gap: 8px;
}
.header-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-btn:hover {
  background: var(--surface-2);
  color: var(--text);
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  flex: 1;
}

/* ===== SIDEBAR / FORM PANEL ===== */
.form-panel {
  background: var(--surface);
  padding: 20px 16px 24px;
  border-bottom: 1px solid var(--border);
}
.form-panel-inner {
  max-width: 600px;
  margin: 0 auto;
}

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Event buttons */
.event-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 20px;
}
.event-btn {
  padding: 10px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: rgba(255,255,255,.03);
  color: var(--text-dim);
  cursor: pointer;
  font-size: clamp(10px, 2vw, 13px);
  font-weight: 600;
  transition: all .25s ease;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.event-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--red), transparent);
  opacity: 0;
  transition: opacity .25s;
}
.event-btn:hover {
  border-color: rgba(255,255,255,.15);
  color: var(--text);
  transform: translateY(-1px);
}
.event-btn.active {
  border-color: var(--red);
  color: #fff;
  background: rgba(220,20,60,.12);
  box-shadow: 0 0 20px var(--glow);
}
.event-btn.active::before { opacity: .15; }
.event-btn .icon {
  display: block;
  font-size: 18px;
  margin-bottom: 2px;
}

/* Form rows */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.form-row.single { grid-template-columns: 1fr; }
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-dim);
  margin-bottom: 5px;
  font-weight: 600;
}
.form-group input {
  width: 100%;
  padding: 11px 14px;
  background: rgba(0,0,0,.35);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  transition: all .2s;
  outline: none;
}
.form-group input:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 3px var(--glow);
}
.form-group input::placeholder { color: rgba(255,255,255,.15); }

/* Submit */
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--red), #ff1744);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all .25s;
  text-transform: uppercase;
  letter-spacing: .08em;
  position: relative;
  overflow: hidden;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--glow);
}
.submit-btn:active { transform: translateY(0); }

/* ===== PREVIEW PANEL ===== */
.preview-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 40px;
  background:
    radial-gradient(ellipse 70% 40% at 50% 50%, rgba(220,20,60,.05), transparent);
}

.preview-container {
  position: relative;
  width: 100%;
  max-width: 400px;
  aspect-ratio: 1 / 1;
  border-radius: 24px;
  overflow: hidden;
  background: #000;
  box-shadow:
    0 0 40px rgba(220,20,60,.15),
    0 25px 60px -12px rgba(0,0,0,.7);
}

.preview-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.preview-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px 16px 16px;
  background: linear-gradient(transparent, rgba(0,0,0,.85) 40%);
  pointer-events: none;
}
.preview-caption {
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,.85);
  font-weight: 400;
}

.preview-empty {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 12px;
}
.preview-empty svg { opacity: .3; }
.preview-empty span { font-size: 14px; }

/* ===== STATUS ===== */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: rgba(0,0,0,.3);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-dot.online { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,.4); }

/* ===== HISTORY LIST ===== */
.history-panel {
  display: none;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px;
  max-height: 240px;
  overflow-y: auto;
}
.history-panel.open { display: block; }

/* ===== RESPONSIVE ===== */

/* Phone (>= 480px) */
@media (min-width: 480px) {
  .form-panel { padding: 24px; }
  .preview-panel { padding: 32px 24px 48px; }
  .preview-container { max-width: 420px; }
}

/* Tablet (>= 768px) */
@media (min-width: 768px) {
  .header { padding: 14px 28px; }
  .header-sub { display: block; }
  .dashboard {
    grid-template-columns: 380px 1fr;
  }
  .form-panel {
    border-bottom: none;
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    overflow-y: auto;
    max-height: calc(100vh - 57px);
  }
  .form-panel-inner { max-width: 100%; }
  .preview-panel {
    padding: 40px;
    min-height: calc(100vh - 57px);
  }
  .preview-container { max-width: 460px; }
}

/* Laptop (>= 1024px) */
@media (min-width: 1024px) {
  .dashboard { grid-template-columns: 420px 1fr; }
  .form-panel { padding: 32px 24px; }
  .preview-container { max-width: 500px; }
  .event-grid { gap: 8px; }
  .event-btn { padding: 12px 8px; font-size: 13px; }
  .event-btn .icon { font-size: 22px; }
  .form-row { gap: 14px; }
  .form-group input { padding: 13px 16px; font-size: 15px; }
  .submit-btn { padding: 16px; font-size: 16px; }
}

/* Desktop (>= 1440px) */
@media (min-width: 1440px) {
  .app { max-width: 1600px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .dashboard { grid-template-columns: 460px 1fr; }
  .form-panel { padding: 36px 28px; }
  .preview-container { max-width: 540px; border-radius: 28px; }
  .event-btn { padding: 14px 10px; font-size: 14px; }
}

/* TV / Ultra-wide (>= 1920px) */
@media (min-width: 1920px) {
  .dashboard { grid-template-columns: 500px 1fr; }
  .form-panel { padding: 44px 36px; }
  .preview-container { max-width: 600px; }
  .event-grid { gap: 10px; }
  .event-btn { padding: 16px 12px; font-size: 15px; }
  .event-btn .icon { font-size: 26px; }
  .form-group label { font-size: 11px; }
  .form-group input { padding: 15px 18px; font-size: 16px; }
  .submit-btn { padding: 18px; font-size: 18px; }
  .header { padding: 18px 36px; }
  .header h1 { font-size: 24px; }
  .preview-caption { font-size: 15px; }
}

/* Landscape phone */
@media (max-height: 500px) and (orientation: landscape) {
  .header { padding: 8px 16px; }
  .dashboard { grid-template-columns: 1fr 1fr; }
  .form-panel { padding: 12px; max-height: calc(100vh - 49px); overflow-y: auto; }
  .preview-panel { padding: 16px; }
  .preview-container { max-width: 280px; }
  .event-grid { grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 12px; }
  .event-btn { padding: 6px 4px; font-size: 10px; }
  .event-btn .icon { font-size: 14px; }
  .form-group { margin-bottom: 8px; }
  .form-group input { padding: 8px 10px; font-size: 12px; }
  .submit-btn { padding: 10px; font-size: 13px; }
}

/* Smooth scrollbar */
.form-panel::-webkit-scrollbar { width: 4px; }
.form-panel::-webkit-scrollbar-track { background: transparent; }
.form-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.preview-container { animation: fadeIn .4s ease; }
.event-btn.active { animation: fadeIn .2s ease; }
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">MD</div>
      <div>
        <h1>Match Day</h1>
        <div class="header-sub">Production Dashboard</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="toggleHistory()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
    </div>
  </header>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <!-- FORM -->
    <div class="form-panel" id="formPanel">
      <div class="form-panel-inner">
        <form id="postForm">
          <div class="section-label">Event Type</div>
          <div class="event-grid" id="eventButtons">
            <button type="button" class="event-btn active" data-event="goal" onclick="setEvent('goal')">
              <span class="icon">⚽</span>Goal
            </button>
            <button type="button" class="event-btn" data-event="card" onclick="setEvent('card')">
              <span class="icon">🟨</span>Card
            </button>
            <button type="button" class="event-btn" data-event="sub" onclick="setEvent('sub')">
              <span class="icon">🔄</span>Sub
            </button>
            <button type="button" class="event-btn" data-event="halftime" onclick="setEvent('halftime')">
              <span class="icon">⏸️</span>HT
            </button>
            <button type="button" class="event-btn" data-event="fulltime" onclick="setEvent('fulltime')">
              <span class="icon">🏁</span>FT
            </button>
          </div>

          <input type="hidden" name="event" id="eventSelect" value="goal">

          <div class="section-label">Match Details</div>

          <div class="form-row">
            <div class="form-group">
              <label>Home</label>
              <input name="home" placeholder="e.g. Nepal" oninput="refreshPreview()">
            </div>
            <div class="form-group">
              <label>Away</label>
              <input name="away" placeholder="e.g. India" oninput="refreshPreview()">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group" style="grid-column: 1;">
              <label id="player1Label">Scorer</label>
              <input name="scorer" id="player1Input" placeholder="Player name" oninput="refreshPreview()">
            </div>
            <div class="form-group" id="player2Field">
              <label>Player In</label>
              <input name="player_on" placeholder="Substitute" oninput="refreshPreview()">
            </div>
          </div>

          <div class="form-row" id="scoreRow" style="display:none;">
            <div class="form-group">
              <label>Home Score</label>
              <input name="sh" id="scoreHome" value="0" placeholder="0" oninput="refreshPreview()">
            </div>
            <div class="form-group">
              <label>Away Score</label>
              <input name="sa" id="scoreAway" value="0" placeholder="0" oninput="refreshPreview()">
            </div>
          </div>

          <div class="form-row single" id="minuteRow">
            <div class="form-group">
              <label>Minute</label>
              <input name="minute" id="minuteField" placeholder="e.g. 23" oninput="refreshPreview()">
            </div>
          </div>

          <button type="submit" class="submit-btn">Post to Facebook</button>
        </form>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-panel">
      <div class="preview-container" id="previewContainer">
        <img id="previewImage" src="" alt="Preview" style="display:none;">
        <div class="preview-empty" id="previewEmpty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <span>Fill in the details to see a preview</span>
        </div>
        <div class="preview-overlay">
          <div class="preview-caption" id="previewCaption">Waiting...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span><span class="status-dot online"></span>System Ready</span>
    <span id="statusInfo">Select an event to begin</span>
  </div>

  <!-- HISTORY -->
  <div class="history-panel" id="historyPanel"></div>
</div>

<script>
function setEvent(e) {
  document.getElementById('eventSelect').value = e;
  document.querySelectorAll('.event-btn').forEach(b => b.classList.toggle('active', b.dataset.event === e));
  const p1label = document.getElementById('player1Label');
  const p2field = document.getElementById('player2Field');
  const scoreRow = document.getElementById('scoreRow');
  const minuteRow = document.getElementById('minuteRow');
  const isScoreEvent = e === 'halftime' || e === 'fulltime';
  scoreRow.style.display = isScoreEvent ? 'grid' : 'none';
  minuteRow.style.display = isScoreEvent ? 'none' : 'block';
  const p1 = document.getElementById('player1Input');
  if (e === 'goal') {
    p1label.textContent = 'Scorer'; p2field.style.display = 'none'; p1.name = 'scorer';
  } else if (e === 'card') {
    p1label.textContent = 'Player'; p2field.style.display = 'none'; p1.name = 'player';
  } else if (e === 'sub') {
    p1label.textContent = 'Player Off'; p2field.style.display = 'block'; p1.name = 'player_off';
  } else {
    p1label.textContent = 'Home Scorer'; p2field.style.display = 'none'; p1.name = 'scorer';
  }
  document.getElementById('statusInfo').textContent = 'Editing ' + e + ' event';
  refreshPreview();
}

let timer;
function refreshPreview() { clearTimeout(timer); timer = setTimeout(doRefresh, 300); }

async function doRefresh() {
  var img = document.getElementById('previewImage');
  var empty = document.getElementById('previewEmpty');
  var caption = document.getElementById('previewCaption');
  var statusInfo = document.getElementById('statusInfo');
  try {
    var form = document.getElementById('postForm');
    var fd = new FormData(form);
    var data = {};
    fd.forEach(function(v, k) { data[k] = v; });
    var res = await fetch('/api/preview', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    var r = await res.json();
    if (r.preview_url) {
      img.src = r.preview_url + '?t=' + Date.now();
      img.style.display = 'block';
      empty.style.display = 'none';
      caption.textContent = r.caption;
      statusInfo.textContent = 'Preview ready';
    } else if (r.error) {
      img.style.display = 'none';
      empty.style.display = 'flex';
      caption.textContent = 'Error: ' + r.error;
      statusInfo.textContent = 'Error generating preview';
    }
  } catch(err) {
    img.style.display = 'none';
    empty.style.display = 'flex';
    caption.textContent = 'Request failed: ' + err.message;
    statusInfo.textContent = 'Connection error';
  }
}

document.getElementById('postForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = e.target.querySelector('.submit-btn');
  btn.textContent = 'Posting...';
  btn.disabled = true;
  try {
    var fd = new FormData(e.target);
    var data = {};
    fd.forEach(function(v, k) { data[k] = v; });
    var res = await fetch('/api/post', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    var r = await res.json();
    if (r.success) {
      document.getElementById('statusInfo').textContent = 'Posted to Facebook!';
      document.getElementById('previewCaption').textContent = 'Posted: ' + r.caption;
    } else {
      document.getElementById('statusInfo').textContent = 'Error: ' + (r.error || 'Unknown');
      document.getElementById('previewCaption').textContent = 'Failed: ' + (r.error || 'Post failed');
    }
  } catch (err) {
    document.getElementById('statusInfo').textContent = 'Network error';
    document.getElementById('previewCaption').textContent = 'Network error: ' + err.message;
  }
  btn.textContent = 'Post to Facebook';
  btn.disabled = false;
});

async function toggleHistory() {
  var panel = document.getElementById('historyPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open') && !panel.innerHTML) {
    try {
      var res = await fetch('/api/history');
      var h = await res.json();
      panel.innerHTML = '<div class="section-label" style="margin-bottom:12px;">Post History</div>' +
        h.slice(0, 10).map(function(p) { return '<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">' +
          '<strong style="color:var(--red);text-transform:uppercase;">' + p.event + '</strong>' +
          '<span style="color:var(--text-dim);float:right;">' + new Date(p.timestamp).toLocaleString() + '</span>' +
          '<div style="color:var(--text-dim);font-size:12px;margin-top:2px;">' + p.caption + '</div></div>'; }).join('') || '<div style="color:var(--text-dim);">No posts yet</div>';
    } catch(e) { panel.innerHTML = '<div style="color:var(--text-dim);">Failed to load history</div>'; }
  }
}

setTimeout(refreshPreview, 500);
</script>
</body>
</html>

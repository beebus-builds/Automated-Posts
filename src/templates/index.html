<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a30">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/static/icons/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>Match Poster Pro</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
:root {
  --bg: #0a0a12;
  --card: #14142a;
  --border: #2a2a4a;
  --accent: #40a8ff;
  --accent2: #2060cc;
  --text: #fff;
  --muted: #8888aa;
  --success: #20cc60;
  --danger: #ff4040;
  --warning: #ffaa00;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.app-container { display: flex; flex-direction: column; height: 100vh; }
.header { padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.header h1 span { color: var(--accent); }
.status-pill { padding: 4px 12px; background: #40a8ff22; border: 1px solid var(--accent); border-radius: 20px; font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.main-layout { display: flex; flex: 1; overflow: hidden; }
.settings-panel { width: 400px; overflow-y: auto; padding: 24px; background: var(--bg); border-right: 1px solid var(--border); }
.preview-panel { flex: 1; background: #05050a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }

.card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
.section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

.event-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
.event-btn { padding: 12px 4px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
.event-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
.event-btn:hover { border-color: var(--accent); background: #1a1a40; }
.event-btn.active { border-color: var(--accent); background: #40a8ff22; box-shadow: 0 0 16px #40a8ff44; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select, .field textarea { width: 100%; padding: 12px; background: #1a1a30; border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 15px; outline: none; transition: border 0.2s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field-row { display: flex; gap: 12px; }
.field-row > * { flex: 1; }
.hidden { display: none !important; }

.video-toggle { display: flex; align-items: center; gap: 12px; padding: 12px 0; margin-bottom: 16px; }
.video-toggle label { font-size: 13px; color: var(--muted); cursor: pointer; }
.switch { position: relative; width: 44px; height: 24px; display: inline-block; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #2a2a4a; border-radius: 24px; transition: 0.3s; }
.slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
.switch input:checked + .slider { background: var(--accent); }
.switch input:checked + .slider:before { transform: translateX(20px); }

.btn-post { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.btn-post:hover { transform: translateY(-1px); box-shadow: 0 8px 24px #40a8ff44; }
.btn-post:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.preview-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--border); }
.preview-image { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.3s; }
.preview-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; transition: opacity 0.3s; pointer-events: none; }

#result { position: fixed; bottom: 24px; right: 24px; max-width: 320px; padding: 16px; border-radius: 16px; display: none; z-index: 1000; animation: slideUp 0.3s ease-out; }
#result.success { background: #0a2a1a; border: 1px solid var(--success); display: block; }
#result.error { background: #2a0a0a; border: 1px solid var(--danger); display: block; }
#result .fb-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 8px 16px; background: #1877f2; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 13px; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.history-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
.history-card:hover { border-color: var(--accent); background: #1a1a40; }
.history-item { display: flex; justify-content: space-between; align-items: center; }
.history-info .h-event { color: var(--accent); font-weight: 700; font-size: 13px; }
.history-info .h-caption { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.history-status { font-size: 11px; font-weight: 600; }
.status-ok { color: var(--success); }
.status-fail { color: var(--danger); }

@media (max-width: 850px) {
  .main-layout { flex-direction: column; overflow-y: auto; }
  .settings-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
  .preview-panel { min-height: 600px; padding: 40px 20px; }
  .event-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>Match <span>Poster Pro</span></h1>
    <div class="status-pill"><span class="dot"></span> Page Connected</div>
  </div>

  <div class="main-layout">
    <div class="settings-panel">
      <div class="card">
        <div class="section-title">1. Select Event</div>
        <div class="event-grid" id="eventGrid">
          <button class="event-btn active" data-event="live"><span class="icon">▶</span> Live</button>
          <button class="event-btn" data-event="goal"><span class="icon">⚽</span> Goal</button>
          <button class="event-btn" data-event="card"><span class="icon">🟨</span> Card</button>
          <button class="event-btn" data-event="sub"><span class="icon">🔄</span> Sub</button>
          <button class="event-btn" data-event="halftime"><span class="icon">⏸</span> Half</button>
          <button class="event-btn" data-event="fulltime"><span class="icon">🏁</span> Full</button>
          <button class="event-btn" data-event="summary"><span class="icon">📊</span> Summary</button>
          <button class="event-btn" data-event="schedule"><span class="icon">📅</span> Schedule</button>
        </div>
      </div>

      <form id="postForm">
        <div class="card">
          <div class="section-title">2. Match Info</div>
          <div class="field-row">
            <div class="field"><label>Home Team</label><input name="home" id="home" placeholder="e.g. Portugal" autocomplete="off"></div>
            <div class="field"><label>Away Team</label><input name="away" id="away" placeholder="e.g. Congo DR" autocomplete="off"></div>
          </div>
          <div class="field"><label>Competition</label><input name="comp" id="comp" placeholder="e.g. FIFA World Cup 2026" autocomplete="off"></div>
        </div>

        <div class="card">
          <div class="section-title">3. Event Details</div>
          <div id="fields-container">
            <div id="fields-live" class="event-fields">
              <div class="field"><label>Kickoff Time</label><input name="time" placeholder="e.g. 17:00 UTC"></div>
            </div>
            <div id="fields-goal" class="event-fields hidden">
              <div class="field-row">
                <div class="field"><label>Home Score</label><input name="sh" type="number" min="0" value="0"></div>
                <div class="field"><label>Away Score</label><input name="sa" type="number" min="0" value="0"></div>
              </div>
              <div class="field"><label>Scorer Name</label><input name="scorer" placeholder="e.g. Cristiano Ronaldo"></div>
              <div class="field-row">
                <div class="field"><label>Minute</label><input name="minute" placeholder="e.g. 23"></div>
                <div class="field"><label>Side</label><select name="team_side"><option value="home">Home</option><option value="away">Away</option></select></div>
              </div>
              <div class="field"><label>Assist (optional)</label><input name="assist" placeholder="e.g. Bruno Fernandes"></div>
            </div>
            <div id="fields-card" class="event-fields hidden">
              <div class="field"><label>Team</label><input name="team" placeholder="e.g. Portugal"></div>
              <div class="field"><label>Player Name</label><input name="player" placeholder="e.g. Pepe"></div>
              <div class="field-row">
                <div class="field"><label>Minute</label><input name="minute" placeholder="e.g. 67"></div>
                <div class="field"><label>Type</label><select name="card_type"><option value="YELLOW">Yellow</option><option value="RED">Red</option></select></div>
              </div>
            </div>
            <div id="fields-sub" class="event-fields hidden">
              <div class="field"><label>Team</label><input name="team" placeholder="e.g. Portugal"></div>
              <div class="field"><label>Player Off</label><input name="off" placeholder="e.g. Joao Felix"></div>
              <div class="field"><label>Player On</label><input name="on" placeholder="e.g. Diogo Jota"></div>
              <div class="field"><label>Minute</label><input name="minute" placeholder="e.g. 72"></div>
            </div>
            <div id="fields-halftime" class="event-fields hidden">
              <div class="field-row">
                <div class="field"><label>Home Score</label><input name="sh" type="number" min="0" value="0"></div>
                <div class="field"><label>Away Score</label><input name="sa" type="number" min="0" value="0"></div>
              </div>
              <div class="field"><label>Scorers (comma separated)</label><input name="scorers" placeholder="e.g. Ronaldo 23', Messi 45+2'"></div>
            </div>
            <div id="fields-secondhalf" class="event-fields hidden">
              <div class="field-row">
                <div class="field"><label>Home Score</label><input name="sh" type="number" min="0" value="0"></div>
                <div class="field"><label>Away Score</label><input name="sa" type="number" min="0" value="0"></div>
              </div>
            </div>
            <div id="fields-fulltime" class="event-fields hidden">
              <div class="field-row">
                <div class="field"><label>Home Score</label><input name="sh" type="number" min="0" value="0"></div>
                <div class="field"><label>Away Score</label><input name="sa" type="number" min="0" value="0"></div>
              </div>
              <div class="field"><label>Scorers (comma separated)</label><input name="scorers" placeholder="e.g. Ronaldo 23' pen, Leao 67'"></div>
            </div>
            <div id="fields-summary" class="event-fields hidden">
              <div class="field-row">
                <div class="field"><label>Home Score</label><input name="sh" type="number" min="0" value="0"></div>
                <div class="field"><label>Away Score</label><input name="sa" type="number" min="0" value="0"></div>
              </div>
              <div class="field"><label>Events (comma separated)</label>
              <textarea name="events" rows="3" placeholder="Goal: Ronaldo 23', Yellow card: Pepe 67'"></textarea></div>
            </div>
            <div id="fields-schedule" class="event-fields hidden">
              <div class="field"><label>Date</label><input name="date" placeholder="e.g. June 17, 2026"></div>
              <div class="field"><label>Matches (comma separated)</label>
              <textarea name="lines" rows="3" placeholder="Portugal vs Congo DR, England vs Croatia"></textarea></div>
            </div>
          </div>

          <div class="video-toggle">
            <span>🎥</span>
            <label class="switch"><input type="checkbox" name="video" id="videoToggle"><span class="slider"></span></label>
            <label>Post as Video Reel</label>
          </div>

          <button type="submit" class="btn" id="submitBtn">
            <span class="spinner hidden" id="spinner"></span>
            <span id="btnText">Post to Facebook</span>
          </button>
        </div>
      </form>

      <div class="card">
        <div class="section-title">Recent Posts</div>
        <div id="historyList"><div class="empty-state"><div class="big">📭</div>No posts yet</div></div>
      </div>
    </div>

    <div class="preview-panel">
      <div class="section-title" style="position:absolute; top:24px; left:24px; width:calc(100% - 48px)">Live Preview</div>
      <div class="preview-container">
        <img id="previewImg" src="" class="preview-image hidden">
        <div id="previewOverlay" class="preview-overlay">Generating preview...</div>
      </div>
      <div id="result"></div>
    </div>
  </div>
</div>

<script>
let currentEvent = "live";
let previewTimeout = null;

document.querySelectorAll(".event-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".event-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentEvent = btn.dataset.event;
    document.getElementById("postForm").querySelector('[name="event"]')?.remove();
    const input = document.createElement("input");
    input.type = "hidden"; input.name = "event"; input.value = currentEvent;
    document.getElementById("postForm").appendChild(input);
    showFields(currentEvent);
    updatePreview();
  });
});

function showFields(event) {
  document.querySelectorAll(".event-fields").forEach(el => el.classList.add("hidden"));
  const target = document.getElementById("fields-" + event);
  if (target) target.classList.remove("hidden");
}

async function updatePreview() {
  const formData = new FormData(document.getElementById("postForm"));
  const params = new URLSearchParams(formData);
  params.append("event", currentEvent);
  
  const imgEl = document.getElementById("previewImg");
  const overlay = document.getElementById("previewOverlay");
  
  try {
    const url = "/api/preview?" + params.toString() + "&t=" + Date.now();
    imgEl.src = url;
    imgEl.onload = () => {
      imgEl.classList.remove("hidden");
      overlay.style.opacity = "0";
    };
    imgEl.onerror = () => {
      overlay.style.opacity = "1";
      overlay.textContent = "Preview unavailable";
    };
  } catch (e) {
    overlay.style.opacity = "1";
    overlay.textContent = "Preview error";
  }
}

// Add listeners to all inputs for real-time preview
document.getElementById("postForm").addEventListener("input", () => {
  clearTimeout(previewTimeout);
  previewTimeout = setTimeout(updatePreview, 500);
});

document.getElementById("postForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const spinner = document.getElementById("spinner");
  const btnText = document.getElementById("btnText");
  const result = document.getElementById("result");

  btn.disabled = true;
  spinner.classList.remove("hidden");
  btnText.textContent = "Posting...";
  result.style.display = "none";
  result.className = "";

  const formData = new FormData(e.target);
  const data = {};
  formData.forEach((v, k) => data[k] = v);

  try {
    const res = await fetch("/api/post", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const json = await res.json();

    if (json.success) {
      let html = '<strong>Posted!</strong><br>' + json.caption;
      if (json.fb_url) html += '<a class="fb-link" href="' + json.fb_url + '" target="_blank">View on Facebook</a>';
      if (json.video_posted) html += '<div style="color:var(--warning);font-size:12px;margin-top:6px;">Video reel also posted</div>';
      result.className = "success";
      result.innerHTML = html;
      loadHistory();
      e.target.reset();
      showFields(currentEvent);
      updatePreview();
    } else {
      result.className = "error";
      result.innerHTML = '<strong>Error:</strong> ' + (json.error || "Unknown error");
    }
  } catch (err) {
    result.className = "error";
    result.innerHTML = "<strong>Network error:</strong> " + err.message;
  }

  btn.disabled = false;
  spinner.classList.add("hidden");
  btnText.textContent = "Post to Facebook";
});

async function loadHistory() {
  try {
    const res = await fetch("/api/history");
    const hist = await res.json();
    const el = document.getElementById("historyList");
    if (!hist.length) {
      el.innerHTML = '<div class="empty-state"><div class="big">📭</div>No posts yet</div>';
      return;
    }
    el.innerHTML = hist.slice(0, 20).map(h => {
      const ok = h.result && !h.result.error;
      const time = new Date(h.timestamp).toLocaleTimeString();
      const date = new Date(h.timestamp).toLocaleDateString();
      return '<div class="history-card">' +
        '<div class="history-item">' +
        '<div class="history-info"><div class="h-event">' + h.event.toUpperCase() + '</div><div class="h-caption">' + (h.caption || "").substring(0, 80) + '</div></div>' +
        '<div class="h-status ' + (ok ? "ok" : "fail") + '">' + (ok ? "Posted" : "Failed") + '</div>' +
        '</div>' +
        '<div class="h-time">' + date + ' ' + time + '</div>' +
        '</div>';
    }).join("");
  } catch (e) {
    document.getElementById("historyList").innerHTML = '<div class="empty-state">Failed to load history</div>';
  }
}

// Init
document.querySelector('.event-btn[data-event="live"]').click();
loadHistory();
</script>
</body>
</html>

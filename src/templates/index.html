<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a30">
<title>Match Poster AI</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
body { background: #0a0a12; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.container { width: 90%; max-width: 500px; text-align: center; }
.header { margin-bottom: 32px; }
.header h1 { font-size: 32px; font-weight: 800; }
.header h1 span { color: #40a8ff; }
.input-box { background: #14142a; border: 2px solid #2a2a4a; border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; resize: none; text-align: center; font-family: inherit; }
.btn-magic { width: 100%; padding: 16px; background: linear-gradient(135deg, #40a8ff, #2060cc); border: none; border-radius: 12px; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: all 0.2s; }
.btn-magic:disabled { opacity: 0.5; }
#status { margin-top: 20px; font-size: 14px; color: #888; }
.preview-badge { display: inline-block; padding: 4px 12px; background: #40a8ff22; border: 1px solid #40a8ff; border-radius: 12px; color: #40a8ff; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Match <span>AI</span></h1>
    <p style="color:#888; font-size:14px;">Just type what happened and I'll post it.</p>
  </div>

  <div class="input-box">
    <div id="aiPreview" class="hidden" style="text-align:center;">
        <div class="preview-badge" id="eventBadge">GOAL</div>
        <div id="previewText" style="font-size:14px; margin-bottom:15px; color:#ccc;"></div>
    </div>
    <textarea id="updateText" rows="4" placeholder="e.g. Portugal goal by Ronaldo 23' 1-0"></textarea>
    <button id="postBtn" class="btn-magic">Magic Post ✨</button>
  </div>
  <div id="status"></div>
</div>

<script>
const textEl = document.getElementById('updateText');
const badgeEl = document.getElementById('eventBadge');
const previewEl = document.getElementById('previewText');
const previewBox = document.getElementById('aiPreview');
const postBtn = document.getElementById('postBtn');
const statusEl = document.getElementById('status');

textEl.addEventListener('input', async () => {
    const text = textEl.value;
    if (text.length < 5) { previewBox.classList.add('hidden'); return; }
    
    try {
        const res = await fetch('/api/parse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        const data = await res.json();
        
        previewBox.classList.remove('hidden');
        badgeEl.textContent = data.event.toUpperCase();
        previewEl.textContent = `posting ${data.event} update for ${data.data.home} vs ${data.data.away}`;
    } catch (e) {
        previewBox.classList.add('hidden');
    }
});

postBtn.addEventListener('click', async () => {
    const text = textEl.value;
    if (!text) return;
    
    postBtn.disabled = true;
    postBtn.textContent = 'Posting...';
    statusEl.textContent = 'Generating graphic and posting...';
    
    try {
        const res = await fetch('/api/post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        const data = await res.json();
        
        if (data.success) {
            statusEl.style.color = '#20cc60';
            statusEl.textContent = 'Successfully posted to Facebook!';
            textEl.value = '';
            previewBox.classList.add('hidden');
        } else {
            statusEl.style.color = '#ff4040';
            statusEl.textContent = 'Error: ' + data.error;
        }
    } catch (e) {
        statusEl.textContent = 'Network error occurred.';
    } finally {
        postBtn.disabled = false;
        postBtn.textContent = 'Magic Post ✨';
    }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }

.card {
  width:1080px; height:1080px;
  position:relative;
  background: linear-gradient(160deg, #0a0f18 0%, #141d2b 40%, #1a2332 70%, #0d1419 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 40% at 50% 30%, rgba(220,20,60,.12), transparent);
  pointer-events:none;
}
.card::after {
  content:''; position:absolute; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1080 1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* Top accent bar */
.accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, #dc143c, #ff6b35); }

/* GOAL! text */
.goal-text {
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:140px;
  letter-spacing:.02em;
  color:#fff;
  text-shadow:
    0 0 40px rgba(220,20,60,.5),
    0 0 80px rgba(220,20,60,.3),
    0 4px 0 rgba(0,0,0,.3);
  text-align:center;
  margin-top:60px;
}

/* Player photo */
.photo-wrapper {
  position:relative;
  width:280px; height:280px;
  margin:30px auto;
}
.photo-ring {
  width:280px; height:280px;
  border-radius:50%;
  background:linear-gradient(135deg, #1e293b, #334155);
  display:flex; align-items:center; justify-content:center;
  border:5px solid #dc143c;
  box-shadow:
    0 0 0 8px rgba(220,20,60,.15),
    0 0 40px rgba(220,20,60,.25),
    inset 0 -20px 40px rgba(0,0,0,.3);
  position:relative;
  overflow:hidden;
}
.photo-ring::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 35% 30%, rgba(255,255,255,.15), transparent 60%);
  border-radius:50%;
}
.initials {
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:72px;
  color:rgba(255,255,255,.7);
  text-shadow:0 2px 10px rgba(0,0,0,.3);
}
.soccer-badge {
  position:absolute;
  bottom:10px; right:-10px;
  width:60px; height:60px;
  background:#fff;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 15px rgba(0,0,0,.4);
  border:3px solid #dc143c;
}
.soccer-badge svg { width:32px; height:32px; }

/* Minute badge */
.minute-badge {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 32px;
  background:#dc143c;
  border-radius:30px;
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;
  color:#fff;
  letter-spacing:.03em;
  box-shadow:0 4px 20px rgba(220,20,60,.4), inset 0 1px 0 rgba(255,255,255,.15);
  margin:0 auto;
}
.minute-badge::before {
  content:'⚽';
  font-size:28px;
}

/* Player name */
.player-name {
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:44px;
  color:#fff;
  text-align:center;
  margin-top:20px;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
  letter-spacing:.02em;
}
.team-name {
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:22px;
  color:#dc143c;
  text-align:center;
  margin-top:4px;
  letter-spacing:.04em;
  text-transform:uppercase;
}

/* Bottom glass panel */
.info-panel {
  position:absolute;
  bottom:40px;
  left:80px; right:80px;
  padding:18px 28px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  text-align:center;
}
.info-panel span {
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:rgba(255,255,255,.6);
  letter-spacing:.06em;
}

/* Bottom line */
.bottom-line { position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #dc143c, transparent 60%); }

/* Mountain silhouettes */
.mountains { position:absolute; bottom:0; left:0; right:0; height:100px; overflow:hidden; pointer-events:none; }
.mountains svg { width:100%; height:100%; }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>

  <div class="goal-text">GOAL!</div>

  <div class="photo-wrapper">
    <div class="photo-ring">
      <span class="initials">{{ initials }}</span>
    </div>
    <div class="soccer-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a2332" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="4"/></svg>
    </div>
  </div>

  <div class="minute-badge">{{ minute }}'</div>

  <div class="player-name">{{ scorer }}</div>
  <div class="team-name">{{ team_name }}</div>

  <div class="info-panel">
    <span>{{ team_name }} • {{ competition }}</span>
  </div>

  <div class="mountains">
    <svg viewBox="0 0 1080 120" preserveAspectRatio="none">
      <path d="M0 120 L0 60 L80 30 L160 50 L250 20 L340 45 L420 15 L520 55 L620 25 L720 50 L820 10 L920 40 L1000 25 L1080 45 L1080 120 Z" fill="#0d1419" opacity=".6"/>
      <path d="M0 120 L0 80 L120 55 L220 75 L320 50 L440 80 L540 60 L640 85 L740 55 L840 75 L940 50 L1080 70 L1080 120 Z" fill="#0d1419" opacity=".4"/>
    </svg>
  </div>

  <div class="bottom-line"></div>
</div>
</body>
</html>

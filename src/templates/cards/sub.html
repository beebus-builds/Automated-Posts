<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&Bebas+Neue&Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
.card {
  width:1080px; height:1080px;
  background: linear-gradient(160deg, #0a0f18 0%, #141d2b 40%, #1a2332 70%, #0d1419 100%);
  position:relative; display:flex; flex-direction:column; align-items:center;
}
.card::after {
  content:''; position:absolute; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1080 1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  pointer-events:none;
}
.accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, #fff, #94a3b8); }

.title {
  font-family:'Montserrat',sans-serif;
  font-weight:700; font-size:44px; color:#fff;
  margin-top:40px; letter-spacing:.08em;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
}

.players-row {
  display:flex; align-items:center; justify-content:center;
  gap:60px; margin-top:40px;
}
.player-col { display:flex; flex-direction:column; align-items:center; width:220px; }
.player-col .ring {
  width:180px; height:180px;
  border-radius:50%;
  background:linear-gradient(135deg, #1e293b, #334155);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  box-shadow:inset 0 -20px 40px rgba(0,0,0,.3);
}
.player-col .ring::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 35% 30%, rgba(255,255,255,.15), transparent 60%);
  border-radius:50%;
}
.player-col .initials { font-family:'Montserrat',sans-serif; font-weight:900; font-size:48px; color:rgba(255,255,255,.7); }
.player-col .ring.out { border:4px solid #dc143c; }
.player-col .ring.in { border:4px solid #22c55e; }
.player-col .label { font-weight:700; font-size:18px; margin-top:8px; letter-spacing:.06em; }
.player-col .label.out { color:#dc143c; }
.player-col .label.in { color:#22c55e; }
.player-col .name { font-weight:600; font-size:18px; color:#fff; margin-top:4px; text-align:center; }
.player-col .number { font-family:'Bebas Neue',sans-serif; font-size:28px; margin-top:2px; }

.arrow {
  font-size:40px; color:rgba(255,255,255,.4);
  margin-top:60px;
}

.team-name { font-weight:600; font-size:20px; color:rgba(255,255,255,.5); margin-top:30px; letter-spacing:.04em; }

.minute-badge {
  padding:8px 28px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:30px;
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  color:#fff;
  border:1px solid rgba(255,255,255,.1);
  margin-top:16px;
}

.bottom-line { position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #fff, transparent 60%); }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="title">SUBSTITUTION</div>
  <div class="players-row">
    <div class="player-col">
      <div class="ring out"><span class="initials">{{ off_initials }}</span></div>
      <span class="label out">OUT</span>
      <span class="name">{{ player_off }}</span>
      <span class="number" style="color:#dc143c;">#{{ off_number }}</span>
    </div>
    <div class="arrow">⟶</div>
    <div class="player-col">
      <div class="ring in"><span class="initials">{{ on_initials }}</span></div>
      <span class="label in">IN</span>
      <span class="name">{{ player_on }}</span>
      <span class="number" style="color:#22c55e;">#{{ on_number }}</span>
    </div>
  </div>
  <div class="team-name">{{ team }}</div>
  <div class="minute-badge">{{ minute }}'</div>
  <div class="bottom-line"></div>
</div>
</body>
</html>

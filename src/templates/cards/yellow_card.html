<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
.card {
  width:1080px; height:1080px;
  position:relative;
  background: linear-gradient(160deg, #0a0f18 0%, #1a1a0f 40%, #2a2a15 70%, #0d1419 100%);
  display:flex; flex-direction:column; align-items:center;
}
.card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 40% at 50% 25%, rgba(255,215,0,.08), transparent);
  pointer-events:none;
}
.card::after {
  content:''; position:absolute; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1080 1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  pointer-events:none;
}
.accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, #fbbf24, #f59e0b); }

/* Card visual */
.card-visual {
  width:180px; height:250px;
  background:linear-gradient(145deg, #fbbf24, #f59e0b);
  border-radius:16px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  margin-top:50px;
  box-shadow:
    0 8px 30px rgba(251,191,36,.3),
    inset 0 1px 0 rgba(255,255,255,.2);
  border:2px solid rgba(255,255,255,.1);
  position:relative;
}
.card-visual .icon { font-size:80px; color:#1a2332; font-weight:900; line-height:1; }
.card-visual .label { font-size:16px; color:#1a2332; font-weight:600; letter-spacing:.1em; margin-top:8px; text-transform:uppercase; }

.title {
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:48px;
  color:#fbbf24;
  text-align:center;
  margin-top:24px;
  letter-spacing:.06em;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
}

.photo-wrapper { position:relative; width:220px; height:220px; margin:24px auto; }
.photo-ring {
  width:220px; height:220px;
  border-radius:50%;
  background:linear-gradient(135deg, #1e293b, #334155);
  display:flex; align-items:center; justify-content:center;
  border:4px solid #fbbf24;
  box-shadow:0 0 30px rgba(251,191,36,.2), inset 0 -20px 40px rgba(0,0,0,.3);
  position:relative; overflow:hidden;
}
.photo-ring::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 35% 30%, rgba(255,255,255,.15), transparent 60%);
  border-radius:50%;
}
.initials { font-family:'Montserrat',sans-serif; font-weight:900; font-size:56px; color:rgba(255,255,255,.7); }

.player-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:38px; color:#fff; text-align:center; text-shadow:0 2px 8px rgba(0,0,0,.5); }
.team-name { font-weight:600; font-size:20px; color:#fbbf24; text-align:center; margin-top:4px; letter-spacing:.04em; text-transform:uppercase; }
.reason { font-size:16px; color:#94a3b8; text-align:center; margin-top:4px; }

.minute-badge {
  display:inline-flex; align-items:center;
  padding:8px 28px;
  background:#fbbf24;
  border-radius:30px;
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  color:#1a2332;
  box-shadow:0 4px 15px rgba(251,191,36,.3);
  margin-top:20px;
}

.bottom-line { position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #fbbf24, transparent 60%); }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="card-visual">
    <span class="icon">!</span>
    <span class="label">Caution</span>
  </div>
  <div class="title">YELLOW CARD</div>
  <div class="photo-wrapper">
    <div class="photo-ring">
      <span class="initials">{{ initials }}</span>
    </div>
  </div>
  <div class="player-name">{{ player }}</div>
  <div class="team-name">{{ team }}</div>
  <div class="reason">{{ reason }}</div>
  <div class="minute-badge">{{ minute }}'</div>
  <div class="bottom-line"></div>
</div>
</body>
</html>

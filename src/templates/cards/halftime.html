<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
.card {
  width:1080px; height:1080px;
  background: linear-gradient(160deg, #0a0f18 0%, #141d2b 40%, #1a2332 70%, #0d1419 100%);
  position:relative; display:flex; flex-direction:column; align-items:center;
}
.card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(220,20,60,.06), transparent);
  pointer-events:none;
}
.card::after {
  content:''; position:absolute; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1080 1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  pointer-events:none;
}
.accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, #dc143c, #ff6b35); }

.title {
  font-family:'Montserrat',sans-serif;
  font-weight:700; font-size:56px; color:#fff;
  margin-top:50px; letter-spacing:.1em;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
}

/* Scoreboard */
.scoreboard {
  display:flex; align-items:center; gap:40px;
  margin-top:30px;
  padding:30px 60px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  border-radius:24px;
  border:1px solid rgba(255,255,255,.08);
}
.score-team { text-align:center; width:180px; }
.score-team .name { font-weight:600; font-size:18px; color:rgba(255,255,255,.7); letter-spacing:.04em; text-transform:uppercase; }
.score-team .score { font-family:'Bebas Neue',sans-serif; font-size:96px; color:#fff; line-height:1.1; text-shadow:0 4px 20px rgba(0,0,0,.3); }
.score-divider { font-family:'Inter',sans-serif; font-size:48px; color:rgba(255,255,255,.3); }

/* Stats */
.stats-panel {
  margin-top:30px;
  padding:24px 40px;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(15px);
  border-radius:16px;
  border:1px solid rgba(255,255,255,.06);
  text-align:center;
  width:520px;
}
.stats-panel .stat-row {
  display:flex; justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:15px;
  color:rgba(255,255,255,.6);
}
.stats-panel .stat-row:last-child { border-bottom:none; }
.stats-panel .stat-row .val { font-weight:600; color:rgba(255,255,255,.8); }

.competition { font-size:14px; color:rgba(255,255,255,.3); margin-top:20px; letter-spacing:.08em; }

.bottom-line { position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #dc143c, transparent 60%); }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="title">HALF TIME</div>
  <div class="scoreboard">
    <div class="score-team">
      <div class="name">{{ home }}</div>
      <div class="score">{{ sh }}</div>
    </div>
    <div class="score-divider">:</div>
    <div class="score-team">
      <div class="name">{{ away }}</div>
      <div class="score">{{ sa }}</div>
    </div>
  </div>
  <div class="stats-panel">
    <div class="stat-row"><span>Possession</span><span class="val">58% — 42%</span></div>
    <div class="stat-row"><span>Total Shots</span><span class="val">7 — 4</span></div>
    <div class="stat-row"><span>Shots on Target</span><span class="val">3 — 2</span></div>
    <div class="stat-row"><span>Corners</span><span class="val">3 — 2</span></div>
  </div>
  <div class="competition">{{ competition }}</div>
  <div class="bottom-line"></div>
</div>
</body>
</html>

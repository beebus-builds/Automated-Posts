services:
  - type: web
    name: football-poster
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.app:app --worker-class eventlet -w 1
    envVars:
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: FB_PIPELINE_ENABLED
        sync: false

name: Daily Football Post

permissions:
  contents: write

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post-update:
    runs-on: ubuntu-latest
    env:
      FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python src/post_football_update.py

      - name: Commit tracking file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add posted_matches.json
          git diff --staged --quiet || git commit -m "Update posted matches tracker"
          git push

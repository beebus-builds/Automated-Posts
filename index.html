<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Match Day Poster</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
:root {
  --accent: #e63946;
  --bg-dark: #07080f;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-dark); color: #eee; min-height: 100vh; }
.app { max-width: 600px; margin: 0 auto; padding: 20px; }

/* Glassmorphism Cards */
.card, .glass-card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

/* Tabs */
.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab { flex: 1; padding: 12px; border: none; background: var(--glass); color: #888; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.3s; }
.tab.active { background: var(--accent); color: white; }
.panel { display: none; }
.panel.active { display: block; }

/* History Grid */
.history-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.hist-item { background: var(--glass); border-radius: 12px; overflow: hidden; }
.hist-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
.hist-info { padding: 10px; font-size: 11px; color: #aaa; }

/* Matches */
.match-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--glass); border-radius: 15px; margin-bottom: 10px; }
.score { font-size: 20px; font-weight: 800; color: white; }
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>Match <span>Day</span></h1></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('matches')">Matches</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>
  <div class="panel active" id="tab-matches">
    <div id="matchesList">Loading...</div>
  </div>
  <div class="panel" id="tab-history">
    <div class="card" id="historyList"></div>
  </div>
</div>
<script>
const API = location.origin + '/api';
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}
async function loadMatches() {
  const r = await fetch(API + '/matches');
  const matches = await r.json();
  const el = document.getElementById('matchesList');
  el.innerHTML = matches.map(m => `
    <div class="match-item">
      <div class="match-status status-${m.status}">${m.status}</div>
      <div class="team-block"><img class="crest" src="${m.home_crest}"><div>${m.home_team}</div></div>
      <div class="score-block">${m.home_score ?? '-'}-${m.away_score ?? '-'}</div>
      <div class="team-block"><img class="crest" src="${m.away_crest}"><div>${m.away_team}</div></div>
    </div>
  `).join('');
}
async function loadHistory() {
  try {
    const r = await fetch(API + '/history');
    const data = await r.json();
    const el = document.getElementById('historyList');
    if (data.length) {
      el.innerHTML = '<div class="history-grid">' + data.map(h => `
        <div class="hist-item">
          <img src="/tmp/card_latest.png" alt="Card" onerror="this.style.display='none'">
          <div class="hist-info">${(h.caption||'').slice(0,30)}...</div>
        </div>
      `).join('') + '</div>';
    } else {
      el.innerHTML = '<div class="empty-msg">No posts yet</div>';
    }
  } catch(e) {}
}

init = () => { loadMatches(); loadHistory(); };
init();


</script>
</body>
</html>

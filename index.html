<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Match Day Poster</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#eee;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:16px}
.header{text-align:center;padding:16px 0 8px}
.header h1{font-size:26px}
.header h1 span{color:#e63946}
.header .sub{color:#666;font-size:13px}
.tabs{display:flex;gap:4px;margin:16px 0;background:#111128;border-radius:14px;padding:4px;border:1px solid #1e1e3a}
.tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;color:#666;font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;transition:all .2s}
.tab.active{background:#e63946;color:#fff;box-shadow:0 4px 15px rgba(230,57,70,.3)}
.tab:hover:not(.active){color:#eee}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:#111128;border:1px solid #1e1e3a;border-radius:16px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}

/* Match list */
.match-item{display:flex;align-items:center;padding:12px;border-radius:12px;cursor:pointer;transition:all .2s;gap:8px}
.match-item:hover{background:#1a1a35}
.match-item.expanded{background:#1a1a35}
.match-status{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;min-width:50px;text-align:center}
.status-LIVE,.status-IN_PLAY{background:#22c55e;color:#000}
.status-PAUSED{background:#f59e0b;color:#000}
.status-FINISHED{background:#555;color:#ccc}
.status-TIMED,.status-SCHEDULED{background:#1e1e3a;color:#888}
.team-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.team-block .crest{width:32px;height:32px;object-fit:contain}
.team-block .name{font-size:12px;font-weight:600;text-align:center}
.score-block{font-size:22px;font-weight:800;min-width:60px;text-align:center}
.score-block .vs{color:#555;font-size:14px}
.comp-name{font-size:10px;color:#555;margin-top:4px;text-align:center}
.match-divider{height:1px;background:#1e1e3a;margin:4px 0}

/* Timeline */
.timeline{padding:8px 0}
.tl-event{display:flex;align-items:center;gap:12px;padding:8px 12px;border-left:2px solid #1e1e3a;margin-left:12px;position:relative}
.tl-event::before{content:'';width:10px;height:10px;border-radius:50%;background:#1e1e3a;position:absolute;left:-6px}
.tl-event.goal::before{background:#ffd700}
.tl-event.kickoff::before{background:#22c55e}
.tl-event.full-time::before{background:#e63946}
.tl-event .tl-icon{font-size:18px}
.tl-event .tl-detail{flex:1;font-size:13px}
.tl-event .tl-minute{font-size:11px;color:#888;min-width:40px}
.tl-event .tl-score{font-size:14px;font-weight:700;color:#ffd700;min-width:50px;text-align:right}
.no-events{text-align:center;color:#555;padding:20px;font-size:13px}

/* Post card */
textarea{width:100%;background:#0a0a1a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px;color:#eee;font-size:14px;resize:vertical;min-height:90px;outline:none;font-family:inherit}
textarea:focus{border-color:#e63946}
.preview-area{width:100%;aspect-ratio:1;background:#0a0a1a;border:2px dashed #1e1e3a;border-radius:14px;margin:12px 0;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .3s}
.preview-area.has-image{border-style:solid;border-color:transparent}
.preview-area img{width:100%;height:100%;object-fit:cover;display:block}
.preview-placeholder{text-align:center;color:#555;padding:40px}
.preview-placeholder .icon{font-size:36px;color:#e63946;margin-bottom:8px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#e63946,#ff1744);color:#fff;box-shadow:0 6px 25px rgba(230,57,70,.3)}
.btn-primary:hover{transform:scale(1.01);box-shadow:0 10px 35px rgba(230,57,70,.4)}
.btn-primary:disabled{background:#1e1e3a;color:#555;cursor:not-allowed;transform:none;box-shadow:none}
.btn-small{width:auto;padding:8px 16px;font-size:12px;text-transform:none;letter-spacing:normal}
.status{margin-top:10px;text-align:center;font-size:13px;min-height:20px;word-break:break-word}
.status.success{color:#22c55e;font-weight:600}
.status.error{color:#e63946;font-weight:600}
.status.loading{color:#888}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.live-toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,20px);background:#111128;border:1px solid #22c55e55;color:#e8fff0;border-radius:12px;padding:10px 14px;font-size:13px;box-shadow:0 12px 35px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:all .25s;max-width:min(92vw,520px);z-index:20}
.live-toast.show{opacity:1;transform:translate(-50%,0)}

/* Pipeline badge */
.pipeline-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:11px;margin-bottom:12px}
.pipeline-badge.active{background:#0a2a1a;color:#22c55e;border:1px solid #22c55e33}
.pipeline-badge.inactive{background:#2a0a0a;color:#e63946;border:1px solid #e6394633}
.pipeline-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.pipeline-dot.active{background:#22c55e;animation:pulse 2s infinite}
.pipeline-dot.inactive{background:#e63946}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* History */
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #0a0a1a;font-size:12px;align-items:center}
.hist-time{color:#555;white-space:nowrap;font-size:11px}
.hist-cap{color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hist-link{color:#e63946;text-decoration:none;font-size:11px;white-space:nowrap}
.hist-link:hover{text-decoration:underline}
.empty-msg{text-align:center;color:#555;padding:30px;font-size:13px}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,#1a1a35 25%,#222248 50%,#1a1a35 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:60px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.footer{text-align:center;color:#333;font-size:11px;padding:16px 0}
@media(max-width:480px){.app{padding:10px}.team-block .name{font-size:11px}.score-block{font-size:18px;min-width:40px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Match <span>Day</span></h1>
    <div class="sub">Live match cards & Facebook poster</div>
  </div>

  <div class="pipeline-badge" id="pipelineBadge">
    <span class="pipeline-dot" id="pipelineDot"></span>
    <span id="pipelineText">Checking...</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('matches')">Matches</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- MATCHES TAB -->
  <div class="panel active" id="tab-matches">
    <div id="matchesList"><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="panel" id="tab-history">
    <div class="card">
      <div id="historyList"></div>
    </div>
  </div>

  <div class="footer">Match Day Poster</div>
</div>
<div class="live-toast" id="liveToast"></div>

<script>
const API = location.origin + '/api';
let matches = [];
let selectedMatch = null;
let updateTimer = null;
let liveSource = null;

// ====== TABS ======
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ====== MATCHES ======
async function loadMatches() {
  try {
    const r = await fetch(API + '/matches');
    matches = await r.json();
    renderMatches();
  } catch(e) {
    document.getElementById('matchesList').innerHTML = '<div class="empty-msg">Failed to load matches</div>';
  }
}

function renderMatches() {
  const el = document.getElementById('matchesList');
  if (!matches.length) {
    el.innerHTML = '<div class="empty-msg">No matches today</div>';
    return;
  }
  el.innerHTML = matches.map((m, i) => {
    const status = m.status || 'SCHEDULED';
    const homeScore = m.home_score != null ? m.home_score : '-';
    const awayScore = m.away_score != null ? m.away_score : '-';
    const isExpanded = selectedMatch === m.id;
    const events = m.events || [];
    return `
      <div class="match-item ${isExpanded ? 'expanded' : ''}" onclick="toggleMatch(${m.id})">
        <div class="match-status status-${status}">${status}</div>
        <div class="team-block">
          ${m.home_crest ? `<img class="crest" src="${m.home_crest}" alt="" onerror="this.style.display='none'">` : ''}
          <div class="name">${m.home_team}</div>
        </div>
        <div class="score-block">
          ${status === 'TIMED' || status === 'SCHEDULED' ? '<span class="vs">VS</span>' : `${homeScore}-${awayScore}`}
        </div>
        <div class="team-block">
          ${m.away_crest ? `<img class="crest" src="${m.away_crest}" alt="" onerror="this.style.display='none'">` : ''}
          <div class="name">${m.away_team}</div>
        </div>
      </div>
      ${m.competition ? `<div class="comp-name">${m.competition} ${m.venue ? '· '+m.venue : ''}</div>` : ''}
      ${isExpanded ? renderTimeline(events, m.id) : ''}
      ${i < matches.length - 1 ? '<div class="match-divider"></div>' : ''}
    `;
  }).join('');
}

function renderTimeline(events, matchId) {
  if (!events || !events.length) {
    return `<div class="timeline"><div class="no-events">Waiting for match events...</div></div>`;
  }
  const icons = { goal: '⚽', kickoff: '▶', 'full-time': '⏹', 'yellow': '🟨', 'red': '🟥', substitution: '🔄' };
  return `<div class="timeline">${events.map(e => {
    const icon = icons[e.type] || '•';
    const detail = e.player ? `${e.player}${e.minute ? ' ('+e.minute+')' : ''}` : e.type;
    return `<div class="tl-event ${e.type}">
      <span class="tl-icon">${icon}</span>
      <span class="tl-detail">${detail}</span>
      <span class="tl-minute">${e.minute || ''}</span>
      <span class="tl-score">${e.score || ''}</span>
    </div>`;
  }).join('')}</div>
  <button class="btn btn-small btn-primary" style="margin:8px 0;width:auto" onclick="postMatchEvent(${matchId})">Generate card & post</button>`;
}

function toggleMatch(id) {
  selectedMatch = selectedMatch === id ? null : id;
  renderMatches();
}

async function postMatchEvent(matchId) {
  const m = matches.find(x => x.id === matchId);
  if (!m) return;
  const desc = `${m.home_team} vs ${m.away_team} - ${m.competition}${m.venue ? ' at '+m.venue : ''}`;
  document.getElementById('desc').value = desc;
  switchTab('post');
  // show preview
  const fd = new FormData();
  fd.append('description', desc);
  const r = await fetch(API + '/post', { method: 'POST', body: fd });
  const data = await r.json();
  if (data.card_url) {
    document.getElementById('preview').innerHTML = `<img src="${data.card_url}?t=${Date.now()}" alt="card"><div style="text-align:center;padding:8px"><a href="${data.card_url}" download style="color:#e63946;font-size:13px">Download</a></div>`;
    document.getElementById('preview').classList.add('has-image');
  }
  if (data.success) {
    setStatus(`Posted! <a href="${data.fb_url}" target="_blank" style="color:#22c55e">View</a>`, 'success');
  } else {
    setStatus(`Error: ${data.error}`, 'error');
  }
}

// ====== POST ======
async function handlePost() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { setStatus('Enter a description', 'error'); return; }

  const btn = document.getElementById('postBtn');
  const text = document.getElementById('btnText');
  const spinner = document.getElementById('btnSpinner');
  btn.disabled = true;
  text.textContent = 'Generating & Posting...';
  spinner.style.display = 'inline-block';
  setStatus('Working...', 'loading');

  try {
    const fd = new FormData();
    fd.append('description', desc);
    const r = await fetch(API + '/post', { method: 'POST', body: fd });
    const data = await r.json();

    if (data.card_url) {
      document.getElementById('preview').innerHTML = `<img src="${data.card_url}?t=${Date.now()}" alt="card"><div style="text-align:center;padding:8px"><a href="${data.card_url}" download style="color:#e63946;font-size:13px">Download card</a></div>`;
      document.getElementById('preview').classList.add('has-image');
    }
    if (data.success) {
      setStatus(`Posted! <a href="${data.fb_url}" target="_blank" style="color:#22c55e">View on Facebook</a>`, 'success');
      document.getElementById('desc').value = '';
      loadHistory();
    } else {
      setStatus(`Error: ${data.error}`, 'error');
    }
  } catch(err) {
    setStatus('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    text.textContent = 'Generate & Post to Facebook';
    spinner.style.display = 'none';
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status ' + (type || '');
}

// ====== HISTORY ======
async function loadHistory() {
  try {
    const r = await fetch(API + '/history');
    const data = await r.json();
    const el = document.getElementById('historyList');
    if (data.length) {
      el.innerHTML = '<h3>Recent Posts</h3>' + data.map(h =>
        `<div class="history-item">
          <span class="hist-time">${(h.timestamp||'').slice(0,16).replace('T',' ')}</span>
          <span class="hist-cap">${(h.caption||'').slice(0,60)}</span>
          ${h.fb_url ? `<a class="hist-link" href="${h.fb_url}" target="_blank">View</a>` : ''}
        </div>`
      ).join('');
    } else {
      el.innerHTML = '<div class="empty-msg">No posts yet</div>';
    }
  } catch(e) {}
}

// ====== PIPELINE STATUS ======
async function checkPipeline() {
  try {
    const r = await fetch(API + '/pipeline/status');
    const data = await r.json();
    const badge = document.getElementById('pipelineBadge');
    const dot = document.getElementById('pipelineDot');
    const text = document.getElementById('pipelineText');
    if (data.running) {
      badge.className = 'pipeline-badge active';
      dot.className = 'pipeline-dot active';
      text.textContent = `Auto-poster active · ${data.total_posted || 0} events posted`;
    } else {
      badge.className = 'pipeline-badge inactive';
      dot.className = 'pipeline-dot inactive';
      text.textContent = 'Auto-poster inactive';
    }
  } catch(e) {}
}

checkPipeline = async function() {
  try {
    const r = await fetch(API + '/pipeline/status');
    const data = await r.json();
    const badge = document.getElementById('pipelineBadge');
    const dot = document.getElementById('pipelineDot');
    const text = document.getElementById('pipelineText');
    if (data.running) {
      badge.className = 'pipeline-badge active';
      dot.className = 'pipeline-dot active';
      text.textContent = `Auto-poster active - ${data.total_posted || 0} events detected`;
    } else {
      badge.className = 'pipeline-badge inactive';
      dot.className = 'pipeline-dot inactive';
      text.textContent = 'Auto-poster inactive';
    }
  } catch(e) {}
};

function showLiveUpdate(message) {
  const toast = document.getElementById('liveToast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showLiveUpdate.timer);
  showLiveUpdate.timer = setTimeout(() => toast.classList.remove('show'), 4500);
}

function connectLiveUpdates() {
  if (!window.EventSource || liveSource) return;

  liveSource = new EventSource(API + '/events');
  liveSource.addEventListener('ready', () => {
    showLiveUpdate('Live match updates connected');
  });

  liveSource.addEventListener('match_updates', event => {
    try {
      const data = JSON.parse(event.data);
      const first = (data.updates || [])[0];
      if (first) {
        const match = first.match || {};
        const ev = first.event || {};
        const title = [match.home_team, match.away_team].filter(Boolean).join(' vs ');
        showLiveUpdate(`${(ev.type || 'Update').toUpperCase()} - ${title}`);
      }
    } catch(e) {
      showLiveUpdate('New match update detected');
    }
    loadMatches();
    loadHistory();
    checkPipeline();
  });

  liveSource.addEventListener('pipeline_tick', () => {
    checkPipeline();
  });

  liveSource.onerror = () => {
    if (liveSource) {
      liveSource.close();
      liveSource = null;
    }
    setTimeout(connectLiveUpdates, 5000);
  };
}

// ====== INIT ======
function init() {
  loadMatches();
  loadHistory();
  checkPipeline();
  connectLiveUpdates();
  // Fallback refresh in case the hosting layer buffers live events.
  updateTimer = setInterval(() => {
    loadMatches();
    checkPipeline();
  }, 30000);
}

init();
</script>
</body>
</html>

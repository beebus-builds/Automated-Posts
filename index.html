<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Match Day Poster</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.container { width: 100%; max-width: 560px; padding: 24px 16px; flex: 1; display: flex; flex-direction: column; }
h1 { font-size: 28px; text-align: center; margin-bottom: 4px; }
h1 span { color: #e63946; }
.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
.card { background: #111128; border: 1px solid #1e1e3a; border-radius: 20px; padding: 24px; margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
textarea { width: 100%; background: #0a0a1a; border: 1px solid #1e1e3a; border-radius: 12px; padding: 14px 16px; color: #eee; font-size: 15px; resize: vertical; min-height: 100px; outline: none; font-family: inherit; }
textarea:focus { border-color: #e63946; }
.preview-area { width: 100%; aspect-ratio: 1; background: #0a0a1a; border: 2px dashed #1e1e3a; border-radius: 14px; margin: 16px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: border-color .3s; }
.preview-area.has-image { border-style: solid; border-color: transparent; }
.preview-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
.preview-placeholder { text-align: center; color: #555; padding: 40px; }
.preview-placeholder .icon { font-size: 40px; color: #e63946; margin-bottom: 8px; }
.preview-placeholder p { font-size: 13px; }
.btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; transition: all .3s; text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-primary { background: linear-gradient(135deg, #e63946, #ff1744); color: #fff; box-shadow: 0 8px 30px rgba(230,57,70,0.3); }
.btn-primary:hover { transform: scale(1.02); box-shadow: 0 12px 40px rgba(230,57,70,0.5); }
.btn-primary:disabled { background: #1e1e3a; color: #555; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: transparent; border: 1px solid #1e1e3a; color: #888; font-size: 13px; text-transform: none; letter-spacing: normal; padding: 10px; }
.btn-secondary:hover { background: #111128; color: #eee; }
.status { margin-top: 12px; text-align: center; font-size: 13px; min-height: 22px; word-break: break-word; }
.status.success { color: #22c55e; font-weight: 600; }
.status.error { color: #e63946; font-weight: 600; }
.status.loading { color: #888; }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid #fff; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.history-section { margin-top: 8px; }
.history-list { max-height: 180px; overflow-y: auto; margin-top: 8px; }
.history-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #0a0a1a; font-size: 12px; }
.hist-time { color: #555; white-space: nowrap; font-size: 11px; }
.hist-cap { color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-link { color: #e63946; text-decoration: none; font-size: 11px; white-space: nowrap; }
.hist-link:hover { text-decoration: underline; }
.footer { text-align: center; color: #333; font-size: 12px; padding: 20px 0; margin-top: auto; }
@media (max-width: 480px) { .container { padding: 16px 12px; } .card { padding: 16px; } }
</style>
</head>
<body>
<div class="container">
  <h1>Match <span>Day</span></h1>
  <p class="subtitle">Generate & post match cards to Facebook</p>

  <div class="card">
    <label for="desc">Match description</label>
    <textarea id="desc" placeholder='e.g. "Portugal vs Uzbekistan – International Friendly at Estádio do Dragão. Kickoff 7:45 PM WET"'></textarea>

    <div class="preview-area" id="preview">
      <div class="preview-placeholder">
        <div class="icon">+</div>
        <p>Your generated card will appear here</p>
      </div>
    </div>

    <button class="btn btn-primary" id="postBtn" onclick="handlePost()">
      <span id="btnText">Generate & Post to Facebook</span>
      <span class="spinner" id="btnSpinner" style="display:none"></span>
    </button>
    <div class="status" id="status"></div>
  </div>

  <div class="card history-section" id="historySection" style="display:none">
    <button class="btn btn-secondary" onclick="toggleHistory()" id="historyToggle">Show History</button>
    <div class="history-list" id="historyList" style="display:none"></div>
  </div>

  <div class="footer">Match Day Poster</div>
</div>

<script>
const API = window.location.origin + '/api';
let historyData = [];

async function loadHistory() {
  try {
    const r = await fetch(API + '/history');
    historyData = await r.json();
    if (historyData.length) {
      document.getElementById('historySection').style.display = 'block';
    }
  } catch(e) {}
}

function toggleHistory() {
  const list = document.getElementById('historyList');
  const toggle = document.getElementById('historyToggle');
  if (list.style.display === 'none') {
    list.style.display = 'block';
    toggle.textContent = 'Hide History';
    list.innerHTML = historyData.map(h =>
      `<div class="history-item">
        <span class="hist-time">${(h.timestamp || '').slice(0, 16).replace('T', ' ')}</span>
        <span class="hist-cap">${(h.caption || '').slice(0, 60)}</span>
        ${h.fb_url ? `<a class="hist-link" href="${h.fb_url}" target="_blank">View</a>` : ''}
      </div>`
    ).join('');
  } else {
    list.style.display = 'none';
    toggle.textContent = `Show History (${historyData.length})`;
  }
}

async function handlePost() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) {
    setStatus('Please enter a match description', 'error');
    return;
  }

  const btn = document.getElementById('postBtn');
  const text = document.getElementById('btnText');
  const spinner = document.getElementById('btnSpinner');
  btn.disabled = true;
  text.textContent = 'Generating & Posting...';
  spinner.style.display = 'inline-block';
  setStatus('Generating card and posting to Facebook...', 'loading');

  try {
    const fd = new FormData();
    fd.append('description', desc);
    const r = await fetch(API + '/post', { method: 'POST', body: fd });
    const data = await r.json();

    if (data.success) {
      setStatus(`Posted! <a href="${data.fb_url}" target="_blank" style="color:#22c55e">View on Facebook</a>`, 'success');
      if (data.card_url) {
        document.getElementById('preview').innerHTML = `<img src="${data.card_url}" alt="card">`;
        document.getElementById('preview').classList.add('has-image');
      }
      document.getElementById('desc').value = '';
      loadHistory();
    } else {
      setStatus('Error: ' + (data.error || 'Unknown'), 'error');
    }
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    text.textContent = 'Generate & Post to Facebook';
    spinner.style.display = 'none';
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status ' + (type || '');
}

loadHistory();
</script>
</body>
</html>

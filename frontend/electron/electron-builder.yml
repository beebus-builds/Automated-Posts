appId: com.matchday.app
productName: Match Day
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
win:
  target: nsis
  icon: public/favicon.ico
mac:
  target: dmg
  icon: public/favicon.ico
linux:
  target: AppImage
  icon: public/favicon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
